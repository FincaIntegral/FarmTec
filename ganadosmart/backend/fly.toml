# fly.toml — GanadoSmart Backend
# app generada: farmtec
# región: gru (São Paulo, la más cercana a Colombia disponible)

app = 'farmtec'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health"
    timeout = "5s"

[[vm]]
  memory = '256mb'
  cpus = 1
  cpu_kind = 'shared'