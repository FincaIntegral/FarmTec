<div class="space-y-2">
  <!-- Leyenda -->
  <div class="flex items-center gap-3 text-[10px]">
    <span class="flex items-center gap-1">
      <span class="w-2 h-2 rounded-sm bg-blue-500"></span>
      <span class="text-muted-foreground font-heading font-bold">Machos</span>
    </span>
    <span class="flex items-center gap-1">
      <span class="w-2 h-2 rounded-sm bg-pink-500"></span>
      <span class="text-muted-foreground font-heading font-bold">Hembras</span>
    </span>
  </div>

  <!-- Barras acumuladas por mes -->
  <div class="h-40 flex items-end gap-2">
    @for (b of barras(); track b.label) {
      <div class="flex-1 h-full flex flex-col justify-end items-center group">
        <div class="text-[9px] text-muted-foreground mb-1 font-bold font-mono opacity-0 group-hover:opacity-100 transition-opacity">{{ b.total }}</div>
        <div class="w-full max-w-8 flex flex-col justify-end" [style.height.%]="b.heightPct">
          <div
            class="w-full bg-pink-500 rounded-t"
            [style.height.%]="b.hembrasPct"
            [title]="'Hembras: ' + b.hembras"
          ></div>
          <div
            class="w-full bg-blue-500"
            [style.height.%]="b.machosPct"
            [title]="'Machos: ' + b.machos"
          ></div>
        </div>
      </div>
    }
  </div>
  <div class="flex gap-2">
    @for (b of barras(); track b.label) {
      <span class="flex-1 text-center text-[9px] text-muted-foreground font-mono capitalize">{{ b.label }}</span>
    }
  </div>

  <div class="flex items-center justify-between pt-2 border-t border-border">
    <span class="text-[10px] text-muted-foreground font-heading font-bold">Total del hato</span>
    <span class="text-xs font-black font-mono text-foreground">{{ totalActual() }}</span>
  </div>
</div>
