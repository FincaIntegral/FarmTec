<div class="space-y-2">
  <!-- Leyenda -->
  <div class="flex items-center gap-3 text-[10px]">
    <span class="flex items-center gap-1">
      <span class="w-2 h-2 rounded-sm bg-emerald-500"></span>
      <span class="text-muted-foreground font-heading font-bold">Ingresos</span>
    </span>
    <span class="flex items-center gap-1">
      <span class="w-2 h-2 rounded-sm bg-red-500"></span>
      <span class="text-muted-foreground font-heading font-bold">Gastos</span>
    </span>
  </div>

  <!-- Barras mensuales -->
  <div class="h-40 flex items-end gap-2">
    @for (b of barras(); track b.label) {
      <div class="flex-1 h-full flex items-end justify-center gap-0.5">
        <div
          class="w-1/2 max-w-3 bg-emerald-500 rounded-t transition-all"
          [style.height.%]="b.ingresosPct"
          [title]="'Ingresos: ' + b.ingresosFmt"
        ></div>
        <div
          class="w-1/2 max-w-3 bg-red-500 rounded-t transition-all"
          [style.height.%]="b.gastosPct"
          [title]="'Gastos: ' + b.gastosFmt"
        ></div>
      </div>
    }
  </div>
  <div class="flex gap-2">
    @for (b of barras(); track b.label) {
      <span class="flex-1 text-center text-[9px] text-muted-foreground font-mono capitalize">{{ b.label }}</span>
    }
  </div>

  <!-- Balance del periodo -->
  <div class="flex items-center justify-between pt-2 border-t border-border">
    <span class="text-[10px] text-muted-foreground font-heading font-bold">Balance (últimos 6 meses)</span>
    <span
      class="text-xs font-black font-mono"
      [class.text-emerald-600]="balance() >= 0"
      [class.dark:text-emerald-400]="balance() >= 0"
      [class.text-red-500]="balance() < 0"
    >
      {{ balanceFormato() }}
    </span>
  </div>
</div>
