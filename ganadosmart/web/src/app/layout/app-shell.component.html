<div class="flex h-screen w-screen overflow-hidden bg-background font-heading" [class.dark]="isDark()">
  <div class="relative flex-shrink-0">
    <app-sidebar [collapsed]="collapsed()" (toggle)="toggleSidebar()" />
  </div>
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <app-topbar [isDark]="isDark()" (sidebarToggle)="toggleSidebar()" (themeToggle)="toggleTheme()" />
    <main
      class="flex-1 overflow-auto p-4 md:p-5"
      style="scrollbar-width: thin; scrollbar-color: rgba(180,100,30,0.25) transparent"
    >
      <router-outlet />
    </main>
  </div>
</div>
