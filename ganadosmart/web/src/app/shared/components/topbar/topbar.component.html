<div class="h-[56px] bg-card border-b border-border flex items-center px-4 gap-3 flex-shrink-0 relative z-10">
  <button (click)="sidebarToggle.emit()" class="text-muted-foreground hover:text-foreground transition-colors lg:hidden">
    <svg lucideMenu [size]="18"></svg>
  </button>

  <div class="flex items-center gap-1.5 text-xs font-heading">
    <span class="text-amber-600 dark:text-amber-500 font-black">GanadoSmart</span>
    <span class="text-muted-foreground font-bold">/</span>
    <span class="text-foreground font-bold">{{ pageTitle() }}</span>
  </div>

  <div class="flex-1"></div>

  <div class="hidden sm:flex items-center gap-1.5 text-[10px] text-muted-foreground">
    <app-dot />
    <span class="font-bold font-heading">Hacienda El Paraíso</span>
  </div>

  <button
    (click)="themeToggle.emit()"
    [title]="isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
    class="w-9 h-9 rounded-xl border border-border flex items-center justify-center hover:border-amber-500 hover:bg-amber-50 dark:hover:bg-amber-950/30 transition-all text-muted-foreground hover:text-amber-600 dark:hover:text-amber-400"
  >
    @if (isDark()) {
      <svg lucideSun [size]="15"></svg>
    } @else {
      <svg lucideMoon [size]="15"></svg>
    }
  </button>

  <div class="w-9 h-9 rounded-full bg-amber-500/15 border border-amber-500/30 flex items-center justify-center cursor-pointer hover:bg-amber-500/25 transition-all flex-shrink-0">
    <span class="text-amber-700 dark:text-amber-400 text-[10px] font-black">{{ iniciales() }}</span>
  </div>
</div>
