<div
  class="rounded-xl border p-4 flex flex-col gap-2 min-w-0 transition-all"
  [class.border-amber-300]="accent()"
  [class.bg-amber-50]="accent()"
  [class.dark:border-amber-700/50]="accent()"
  [class.dark:bg-amber-950/20]="accent()"
  [class.border-border]="!accent()"
  [class.bg-card]="!accent()"
>
  <div class="flex items-start justify-between gap-2">
    <span class="text-[11px] font-bold text-muted-foreground uppercase tracking-wider leading-tight font-heading">{{ label() }}</span>
    <span
      class="p-1.5 rounded-lg flex-shrink-0"
      [class.bg-amber-200]="accent()"
      [class.text-amber-800]="accent()"
      [class.dark:bg-amber-900/60]="accent()"
      [class.dark:text-amber-400]="accent()"
      [class.bg-muted]="!accent()"
      [class.text-muted-foreground]="!accent()"
    >
      <svg [lucideIcon]="icon()" [size]="12"></svg>
    </span>
  </div>
  <span class="font-black text-xl text-foreground leading-none font-mono">{{ value() }}</span>
  @if (sub() || delta() !== undefined) {
    <div class="flex items-center gap-1.5">
      @if (delta() !== undefined) {
        <span
          class="flex items-center gap-0.5 text-[10px] font-bold"
          [class.text-emerald-600]="delta()! >= 0"
          [class.dark:text-emerald-400]="delta()! >= 0"
          [class.text-red-600]="delta()! < 0"
          [class.dark:text-red-400]="delta()! < 0"
        >
          @if (delta()! >= 0) {
            <svg lucideArrowUp [size]="9"></svg>
          } @else {
            <svg lucideArrowDown [size]="9"></svg>
          }
          {{ Math.abs(delta()!) }}%
        </span>
      }
      @if (sub()) {
        <span class="text-[10px] text-muted-foreground">{{ sub() }}</span>
      }
    </div>
  }
</div>
